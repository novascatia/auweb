<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seyraphine - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] }, colors: { paper: '#faf9f6', ink: '#1c1c1c', accent: '#ea580c' } } }
        }
    </script>
    <style>
        .ql-toolbar.ql-snow { border-radius: 0.5rem 0.5rem 0 0; border-color: #d1d5db; font-family: 'Inter', sans-serif;}
        .ql-container.ql-snow { border-radius: 0 0 0.5rem 0.5rem; border-color: #d1d5db; font-family: 'Playfair Display', serif; font-size: 1.125rem;}
        .ql-editor { min-height: 24rem; }
        
        /* Auto Resize Gambar di Editor */
        .ql-editor img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 0.5rem; 
            margin: 1.5rem auto; 
            display: block; 
            cursor: grab; 
        }
        .ql-editor img:active { cursor: grabbing; }

        /* Kustomisasi Quill untuk Dark Mode */
        .dark .ql-toolbar.ql-snow, .dark .ql-container.ql-snow { border-color: #374151; }
        .dark .ql-toolbar.ql-snow .ql-picker, .dark .ql-toolbar.ql-snow .ql-stroke { color: #d1d5db; stroke: #d1d5db; }
        .dark .ql-toolbar.ql-snow .ql-fill { fill: #d1d5db; }
        .dark .ql-editor { color: #f3f4f6; }
        .dark .ql-editor.ql-blank::before { color: #9ca3af; }
    </style>
</head>
<body class="bg-paper text-ink dark:bg-gray-900 dark:text-gray-100 font-sans min-h-screen p-8 transition-colors duration-300">

    <button id="theme-toggle" class="fixed top-6 right-6 p-2 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors z-50">
        <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
        <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
    </button>

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-end mb-8 border-b border-gray-200 dark:border-gray-700 pb-4">
            <h1 class="text-3xl font-serif font-bold text-ink dark:text-white">Admin Dashboard</h1>
            
            <div class="flex space-x-4">
                <button onclick="switchTab('post')" id="tab-post" class="text-accent font-semibold border-b-2 border-accent pb-1 transition-all">Write Story</button>
                <button onclick="switchTab('review')" id="tab-review" class="text-gray-500 dark:text-gray-400 hover:text-ink dark:hover:text-white font-medium pb-1 transition-all">Review Stories</button>
            </div>
        </div>

        <div id="post-section" class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
            <h2 id="form-title" class="text-xl font-bold mb-6 text-ink dark:text-white">Post a New AU Chapter</h2>
            
            <form id="post-form" class="space-y-5">
                <input type="hidden" id="edit-id" value="">

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Title</label>
                    <input type="text" id="title" required class="w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-ink dark:text-white px-4 py-2 rounded-lg focus:ring-2 focus:ring-accent outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Slug (URL khusus, cth: chapter-1)</label>
                    <input type="text" id="slug" required pattern="[a-z0-9-]+" class="w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-ink dark:text-white px-4 py-2 rounded-lg focus:ring-2 focus:ring-accent font-mono text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Synopsis</label>
                    <textarea id="synopsis" required class="w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-ink dark:text-white px-4 py-2 rounded-lg h-24 focus:ring-2 focus:ring-accent outline-none"></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Story Content</label>
                    <div id="editor-container" class="bg-white dark:bg-gray-800"></div>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-2 font-medium">💡 Tips: Drag & Drop foto ke kotak putih. Klik dan tahan foto untuk memindahkannya.</p>
                </div>

                <div class="flex items-center pt-2">
                    <input type="checkbox" id="isPaid" class="w-4 h-4 text-accent bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 rounded focus:ring-accent">
                    <label for="isPaid" class="ml-2 text-sm text-gray-700 dark:text-gray-300">Set as Paid Story</label>
                </div>
                
                <div class="flex space-x-4 mt-4">
                    <button type="submit" id="submitBtn" class="flex-1 bg-ink dark:bg-white text-white dark:text-gray-900 font-medium py-3 rounded-lg hover:bg-gray-800 dark:hover:bg-gray-200 transition-colors">
                        Publish Story
                    </button>
                    <button type="button" onclick="cancelEdit()" id="cancelBtn" class="hidden px-6 py-3 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors font-medium">
                        Cancel Edit
                    </button>
                </div>
            </form>
            
            <p id="postMessage" class="mt-4 text-center text-sm hidden"></p>
        </div>

        <div id="review-section" class="hidden bg-white dark:bg-gray-800 p-8 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-ink dark:text-white">Manage Published Stories</h2>
                <button onclick="loadReviewStories()" class="text-sm bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200 px-3 py-1 rounded-md hover:bg-gray-200 dark:hover:bg-gray-600">↻ Refresh</button>
            </div>
            
            <div id="review-list" class="space-y-4">
                <p class="text-gray-500 dark:text-gray-400 text-center py-8">Loading stories...</p>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    
    <script>
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
        const themeToggleBtn = document.getElementById('theme-toggle');

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        });

        let supabase;

        const quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, false] }],
                    ['bold', 'italic', 'underline'],
                    ['blockquote', 'image'],
                    [{ 'align': [] }]
                ]
            },
            placeholder: 'Tulis cerita AU-mu di sini...'
        });

        async function initSupabase() {
            try {
                const response = await fetch('/.netlify/functions/get-config');
                const keys = await response.json();
                supabase = window.supabase.createClient(keys.supabaseUrl, keys.supabaseKey);
                loadReviewStories();
            } catch (error) {
                alert("Gagal memuat kredensial dari server.");
            }
        }

        function switchTab(tabName) {
            const postSec = document.getElementById('post-section');
            const reviewSec = document.getElementById('review-section');
            const tabPostBtn = document.getElementById('tab-post');
            const tabReviewBtn = document.getElementById('tab-review');

            if (tabName === 'post') {
                postSec.classList.remove('hidden');
                reviewSec.classList.add('hidden');
                tabPostBtn.classList.add('text-accent', 'border-b-2', 'border-accent');
                tabPostBtn.classList.remove('text-gray-500', 'dark:text-gray-400');
                tabReviewBtn.classList.remove('text-accent', 'border-b-2', 'border-accent');
                tabReviewBtn.classList.add('text-gray-500', 'dark:text-gray-400');
            } else {
                postSec.classList.add('hidden');
                reviewSec.classList.remove('hidden');
                tabReviewBtn.classList.add('text-accent', 'border-b-2', 'border-accent');
                tabReviewBtn.classList.remove('text-gray-500', 'dark:text-gray-400');
                tabPostBtn.classList.remove('text-accent', 'border-b-2', 'border-accent');
                tabPostBtn.classList.add('text-gray-500', 'dark:text-gray-400');
                loadReviewStories();
            }
        }

        async function loadReviewStories() {
            const reviewList = document.getElementById('review-list');
            reviewList.innerHTML = '<p class="text-gray-500 dark:text-gray-400 text-center py-8 animate-pulse">Loading stories...</p>';

            const { data, error } = await supabase
                .from('stories')
                .select('id, title, slug, views, created_at')
                .order('created_at', { ascending: false });

            if (error) {
                reviewList.innerHTML = `<p class="text-red-500">Error: ${error.message}</p>`;
                return;
            }

            if (data.length === 0) {
                reviewList.innerHTML = '<p class="text-gray-500 dark:text-gray-400 text-center py-8">Belum ada cerita.</p>';
                return;
            }

            reviewList.innerHTML = data.map(story => `
                <div class="flex justify-between items-center p-4 border border-gray-200 dark:border-gray-700 rounded-lg hover:shadow-sm transition-shadow">
                    <div>
                        <h3 class="font-bold font-serif text-lg text-ink dark:text-white">${story.title}</h3>
                        <p class="text-sm text-gray-500 dark:text-gray-400">Slug: /story/${story.slug} | Views: ${story.views || 0}</p>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="prepareEdit('${story.id}')" class="px-3 py-1 bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-400 rounded-md text-sm font-medium hover:bg-blue-200 dark:hover:bg-blue-800">Edit</button>
                        <button onclick="deleteStory('${story.id}')" class="px-3 py-1 bg-red-100 dark:bg-red-900/50 text-red-700 dark:text-red-400 rounded-md text-sm font-medium hover:bg-red-200 dark:hover:bg-red-800">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function prepareEdit(id) {
            const { data, error } = await supabase.from('stories').select('*').eq('id', id).single();
            if (error) return alert("Gagal mengambil data cerita.");

            document.getElementById('edit-id').value = data.id;
            document.getElementById('title').value = data.title;
            document.getElementById('slug').value = data.slug;
            document.getElementById('synopsis').value = data.synopsis;
            document.getElementById('isPaid').checked = data.is_paid;
            
            quill.root.innerHTML = data.content;

            document.getElementById('form-title').innerText = "Edit Story";
            document.getElementById('submitBtn').innerText = "Update Story";
            document.getElementById('cancelBtn').classList.remove('hidden');

            switchTab('post');
            window.scrollTo(0, 0);
        }

        function cancelEdit() {
            document.getElementById('post-form').reset();
            document.getElementById('edit-id').value = "";
            quill.setContents([]);
            document.getElementById('form-title').innerText = "Post a New AU Chapter";
            document.getElementById('submitBtn').innerText = "Publish Story";
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        async function deleteStory(id) {
            if (!confirm("Yakin ingin menghapus cerita ini secara permanen?")) return;
            const { error } = await supabase.from('stories').delete().eq('id', id);
            if (error) alert("Gagal menghapus.");
            else loadReviewStories();
        }

        async function uploadImageToSupabase(file) {
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = '⏳ Uploading Image...';
            submitBtn.disabled = true;

            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`;

            const { data, error } = await supabase.storage.from('media').upload(fileName, file);

            if (error) {
                alert('Gagal upload gambar: ' + error.message);
            } else {
                const { data: publicUrlData } = supabase.storage.from('media').getPublicUrl(fileName);
                
                const range = quill.getSelection(true);
                quill.insertEmbed(range.index, 'image', publicUrlData.publicUrl);
                quill.insertText(range.index + 1, '\n');
                quill.setSelection(range.index + 2); 
            }

            submitBtn.innerText = originalText;
            submitBtn.disabled = false;
        }

        quill.getModule('toolbar').addHandler('image', () => {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();

            input.onchange = async () => {
                const file = input.files[0];
                if (file) await uploadImageToSupabase(file);
            };
        });

        quill.root.addEventListener('drop', async (e) => {
            e.preventDefault();
            if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) {
                const file = e.dataTransfer.files[0];
                if (file.type.startsWith('image/')) {
                    await uploadImageToSupabase(file);
                }
            }
        });

        document.getElementById('post-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const msgBox = document.getElementById('postMessage');
            const editId = document.getElementById('edit-id').value;
            
            submitBtn.innerText = 'Processing...';
            submitBtn.disabled = true;

            const storyData = {
                title: document.getElementById('title').value,
                slug: document.getElementById('slug').value.toLowerCase().replace(/\s+/g, '-'),
                synopsis: document.getElementById('synopsis').value,
                content: quill.root.innerHTML, 
                is_paid: document.getElementById('isPaid').checked
            };

            let error;
            if (editId) {
                const res = await supabase.from('stories').update(storyData).eq('id', editId);
                error = res.error;
            } else {
                const res = await supabase.from('stories').insert([storyData]);
                error = res.error;
            }

            msgBox.classList.remove('hidden');
            if (error) {
                msgBox.innerText = `Error: ${error.message}`;
                msgBox.className = 'mt-4 text-center text-sm text-red-500 font-medium';
            } else {
                msgBox.innerText = editId ? 'Story Updated Successfully!' : 'Story Published Successfully!';
                msgBox.className = 'mt-4 text-center text-sm text-green-500 font-medium';
                cancelEdit(); 
                loadReviewStories(); 
            }
            
            submitBtn.disabled = false;
        });

        initSupabase();
    </script>
</body>
</html>
