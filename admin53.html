<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seyraphine - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Quill.js Editor CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] }, colors: { paper: '#faf9f6', ink: '#1c1c1c', accent: '#ea580c' } } } }
    </script>
    <style>
        .ql-toolbar.ql-snow { border-radius: 0.5rem 0.5rem 0 0; border-color: #d1d5db; font-family: 'Inter', sans-serif;}
        .ql-container.ql-snow { border-radius: 0 0 0.5rem 0.5rem; border-color: #d1d5db; font-family: 'Playfair Display', serif; font-size: 1.125rem;}
        .ql-editor { min-height: 24rem; }
        
        /* Auto Resize Gambar di Editor */
        .ql-editor img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 0.5rem; 
            margin: 1.5rem auto; 
            display: block; 
            cursor: grab; /* Memberi tahu bahwa gambar bisa ditarik/geser */
        }
        .ql-editor img:active { cursor: grabbing; }
    </style>
</head>
<body class="bg-paper text-ink font-sans min-h-screen p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header Dashboard -->
        <div class="flex justify-between items-end mb-8 border-b border-gray-200 pb-4">
            <h1 class="text-3xl font-serif font-bold">Admin Dashboard</h1>
            
            <!-- Tab Menu -->
            <div class="flex space-x-4">
                <button onclick="switchTab('post')" id="tab-post" class="text-accent font-semibold border-b-2 border-accent pb-1 transition-all">Write Story</button>
                <button onclick="switchTab('review')" id="tab-review" class="text-gray-500 hover:text-ink font-medium pb-1 transition-all">Review Stories</button>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- SECTION 1: WRITE / EDIT STORY -->
        <!-- ========================================== -->
        <div id="post-section" class="bg-white p-8 rounded-xl shadow-sm border border-gray-100">
            <h2 id="form-title" class="text-xl font-bold mb-6">Post a New AU Chapter</h2>
            
            <form id="post-form" class="space-y-5">
                <!-- Input rahasia untuk menyimpan ID cerita yang sedang di-edit -->
                <input type="hidden" id="edit-id" value="">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                    <input type="text" id="title" required class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:ring-2 focus:ring-accent outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Slug (URL khusus, cth: chapter-1)</label>
                    <input type="text" id="slug" required pattern="[a-z0-9-]+" class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:ring-2 focus:ring-accent font-mono text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Synopsis</label>
                    <textarea id="synopsis" required class="w-full border border-gray-300 px-4 py-2 rounded-lg h-24 focus:ring-2 focus:ring-accent outline-none"></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Story Content</label>
                    <div id="editor-container" class="bg-white"></div>
                    <p class="text-xs text-gray-500 mt-2 font-medium">💡 Tips: Drag & Drop foto ke kotak putih. Klik dan tahan foto untuk memindahkannya.</p>
                </div>

                <div class="flex items-center pt-2">
                    <input type="checkbox" id="isPaid" class="w-4 h-4 text-accent border-gray-300 rounded focus:ring-accent">
                    <label for="isPaid" class="ml-2 text-sm text-gray-700">Set as Paid Story</label>
                </div>
                
                <div class="flex space-x-4 mt-4">
                    <button type="submit" id="submitBtn" class="flex-1 bg-ink text-white font-medium py-3 rounded-lg hover:bg-gray-800 transition-colors">
                        Publish Story
                    </button>
                    <button type="button" onclick="cancelEdit()" id="cancelBtn" class="hidden px-6 py-3 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors font-medium">
                        Cancel Edit
                    </button>
                </div>
            </form>
            
            <p id="postMessage" class="mt-4 text-center text-sm hidden"></p>
        </div>

        <!-- ========================================== -->
        <!-- SECTION 2: REVIEW & MANAGE STORIES -->
        <!-- ========================================== -->
        <div id="review-section" class="hidden bg-white p-8 rounded-xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Manage Published Stories</h2>
                <button onclick="loadReviewStories()" class="text-sm bg-gray-100 px-3 py-1 rounded-md hover:bg-gray-200">↻ Refresh</button>
            </div>
            
            <div id="review-list" class="space-y-4">
                <p class="text-gray-500 text-center py-8">Loading stories...</p>
            </div>
        </div>

    </div>

    <!-- Supabase & Quill JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    
    <script>
        let supabase;

        // Inisialisasi Quill Editor
        const quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, false] }],
                    ['bold', 'italic', 'underline'],
                    ['blockquote', 'image'],
                    [{ 'align': [] }]
                ]
            },
            placeholder: 'Tulis cerita AU-mu di sini...'
        });

        // 1. INIT SUPABASE
        async function initSupabase() {
            try {
                const response = await fetch('/.netlify/functions/get-config');
                const keys = await response.json();
                supabase = window.supabase.createClient(keys.supabaseUrl, keys.supabaseKey);
                
                // Load data untuk tab review diam-diam di background
                loadReviewStories();
            } catch (error) {
                alert("Gagal memuat kredensial dari server.");
            }
        }

        // ==========================================
        // FITUR TAB & UI SWITCH
        // ==========================================
        function switchTab(tabName) {
            const postSec = document.getElementById('post-section');
            const reviewSec = document.getElementById('review-section');
            const tabPostBtn = document.getElementById('tab-post');
            const tabReviewBtn = document.getElementById('tab-review');

            if (tabName === 'post') {
                postSec.classList.remove('hidden');
                reviewSec.classList.add('hidden');
                tabPostBtn.classList.add('text-accent', 'border-b-2', 'border-accent');
                tabPostBtn.classList.remove('text-gray-500');
                tabReviewBtn.classList.remove('text-accent', 'border-b-2', 'border-accent');
                tabReviewBtn.classList.add('text-gray-500');
            } else {
                postSec.classList.add('hidden');
                reviewSec.classList.remove('hidden');
                tabReviewBtn.classList.add('text-accent', 'border-b-2', 'border-accent');
                tabReviewBtn.classList.remove('text-gray-500');
                tabPostBtn.classList.remove('text-accent', 'border-b-2', 'border-accent');
                tabPostBtn.classList.add('text-gray-500');
                loadReviewStories();
            }
        }

        // ==========================================
        // FITUR REVIEW & MANAGE CERITA
        // ==========================================
        async function loadReviewStories() {
            const reviewList = document.getElementById('review-list');
            reviewList.innerHTML = '<p class="text-gray-500 text-center py-8 animate-pulse">Loading stories...</p>';

            const { data, error } = await supabase
                .from('stories')
                .select('id, title, slug, views, created_at')
                .order('created_at', { ascending: false });

            if (error) {
                reviewList.innerHTML = `<p class="text-red-500">Error: ${error.message}</p>`;
                return;
            }

            if (data.length === 0) {
                reviewList.innerHTML = '<p class="text-gray-500 text-center py-8">Belum ada cerita.</p>';
                return;
            }

            reviewList.innerHTML = data.map(story => `
                <div class="flex justify-between items-center p-4 border border-gray-200 rounded-lg hover:shadow-sm transition-shadow">
                    <div>
                        <h3 class="font-bold font-serif text-lg">${story.title}</h3>
                        <p class="text-sm text-gray-500">Slug: /story/${story.slug} | Views: ${story.views || 0}</p>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="prepareEdit('${story.id}')" class="px-3 py-1 bg-blue-100 text-blue-700 rounded-md text-sm font-medium hover:bg-blue-200">Edit</button>
                        <button onclick="deleteStory('${story.id}')" class="px-3 py-1 bg-red-100 text-red-700 rounded-md text-sm font-medium hover:bg-red-200">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function prepareEdit(id) {
            const { data, error } = await supabase.from('stories').select('*').eq('id', id).single();
            if (error) return alert("Gagal mengambil data cerita.");

            // Pindahkan data ke Form
            document.getElementById('edit-id').value = data.id;
            document.getElementById('title').value = data.title;
            document.getElementById('slug').value = data.slug;
            document.getElementById('synopsis').value = data.synopsis;
            document.getElementById('isPaid').checked = data.is_paid;
            
            // Masukkan HTML ke dalam editor
            quill.root.innerHTML = data.content;

            // Ubah UI Form
            document.getElementById('form-title').innerText = "Edit Story";
            document.getElementById('submitBtn').innerText = "Update Story";
            document.getElementById('cancelBtn').classList.remove('hidden');

            // Pindah ke tab form
            switchTab('post');
            window.scrollTo(0, 0);
        }

        function cancelEdit() {
            document.getElementById('post-form').reset();
            document.getElementById('edit-id').value = "";
            quill.setContents([]);
            document.getElementById('form-title').innerText = "Post a New AU Chapter";
            document.getElementById('submitBtn').innerText = "Publish Story";
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        async function deleteStory(id) {
            if (!confirm("Yakin ingin menghapus cerita ini secara permanen?")) return;
            const { error } = await supabase.from('stories').delete().eq('id', id);
            if (error) alert("Gagal menghapus.");
            else loadReviewStories();
        }


        // ==========================================
        // FITUR UPLOAD GAMBAR KE SUPABASE
        // ==========================================
        async function uploadImageToSupabase(file) {
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = '⏳ Uploading Image...';
            submitBtn.disabled = true;

            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`;

            const { data, error } = await supabase.storage.from('media').upload(fileName, file);

            if (error) {
                alert('Gagal upload gambar: ' + error.message);
            } else {
                const { data: publicUrlData } = supabase.storage.from('media').getPublicUrl(fileName);
                
                const range = quill.getSelection(true);
                // 1. Masukkan Gambar
                quill.insertEmbed(range.index, 'image', publicUrlData.publicUrl);
                // 2. Beri "Enter" otomatis di bawah gambar agar gampang lanjut nulis
                quill.insertText(range.index + 1, '\n');
                // 3. Pindah kursor ke bawah gambar
                quill.setSelection(range.index + 2); 
            }

            submitBtn.innerText = originalText;
            submitBtn.disabled = false;
        }

        quill.getModule('toolbar').addHandler('image', () => {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();

            input.onchange = async () => {
                const file = input.files[0];
                if (file) await uploadImageToSupabase(file);
            };
        });

        quill.root.addEventListener('drop', async (e) => {
            e.preventDefault();
            if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) {
                const file = e.dataTransfer.files[0];
                if (file.type.startsWith('image/')) {
                    await uploadImageToSupabase(file);
                }
            }
        });


        // ==========================================
        // FITUR SUBMIT (PUBLISH / UPDATE)
        // ==========================================
        document.getElementById('post-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const msgBox = document.getElementById('postMessage');
            const editId = document.getElementById('edit-id').value;
            
            submitBtn.innerText = 'Processing...';
            submitBtn.disabled = true;

            const storyData = {
                title: document.getElementById('title').value,
                slug: document.getElementById('slug').value.toLowerCase().replace(/\s+/g, '-'),
                synopsis: document.getElementById('synopsis').value,
                content: quill.root.innerHTML, 
                is_paid: document.getElementById('isPaid').checked
            };

            let error;
            if (editId) {
                // Proses Update
                const res = await supabase.from('stories').update(storyData).eq('id', editId);
                error = res.error;
            } else {
                // Proses Insert Baru
                const res = await supabase.from('stories').insert([storyData]);
                error = res.error;
            }

            msgBox.classList.remove('hidden');
            if (error) {
                msgBox.innerText = `Error: ${error.message}`;
                msgBox.className = 'mt-4 text-center text-sm text-red-500 font-medium';
            } else {
                msgBox.innerText = editId ? 'Story Updated Successfully!' : 'Story Published Successfully!';
                msgBox.className = 'mt-4 text-center text-sm text-green-500 font-medium';
                cancelEdit(); // Reset form
                loadReviewStories(); // Refresh list cerita di background
            }
            
            submitBtn.disabled = false;
        });

        // Jalankan saat pertama kali buka web
        initSupabase();
    </script>
</body>
</html>
