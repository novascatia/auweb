<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading - Seyraphine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] }, colors: { paper: '#faf9f6', ink: '#1c1c1c', accent: '#ea580c' } } } }
    </script>
    <style>
        .story-content p { margin-bottom: 1.5em; line-height: 1.8; }
    </style>
</head>
<body class="bg-paper text-ink font-sans min-h-screen p-8">
    
    <div class="max-w-2xl mx-auto">
        <a href="/library.html" class="text-sm text-gray-500 hover:text-ink mb-12 inline-block">&larr; Back to Library</a>
        
        <div id="loading" class="animate-pulse text-center py-10">Loading story...</div>
        
        <article id="story-container" class="hidden">
            <h1 id="title" class="text-4xl md:text-5xl font-serif font-bold mb-2 text-center"></h1>
            
            <!-- Tempat menampilkan views -->
            <p id="view-count" class="text-sm text-gray-500 mb-8 text-center font-medium tracking-wide"></p>
            
            <div id="content" class="story-content text-lg text-gray-800 whitespace-pre-wrap"></div>
        </article>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
    <script>
        async function loadStory() {
            try {
                // 1. Ambil keys
                const configRes = await fetch('/.netlify/functions/get-config');
                const keys = await configRes.json();
                const supabase = window.supabase.createClient(keys.supabaseUrl, keys.supabaseKey);

                // 2. Ambil slug dari URL
                const pathArray = window.location.pathname.split('/');
                const slug = pathArray[pathArray.length - 1]; 

                // 3. Tarik data cerita
                const { data, error } = await supabase
                    .from('stories')
                    .select('*')
                    .eq('slug', slug)
                    .single();

                document.getElementById('loading').style.display = 'none';

                if (error || !data) {
                    document.getElementById('story-container').innerHTML = '<h1 class="text-2xl font-serif text-center mt-10">Story not found.</h1>';
                } else {
                    // Tampilkan data ke layar
                    document.getElementById('title').innerText = data.title;
                    document.getElementById('content').innerText = data.content; 
                    
                    // Hitung views baru (angka lama + 1)
                    const currentViews = data.views || 0;
                    const newViews = currentViews + 1;
                    
                    // Tampilkan views ke layar
                    document.getElementById('view-count').innerText = `${newViews} views`;
                    
                    // 4. Update views ke database di latar belakang
                    await supabase
                        .from('stories')
                        .update({ views: newViews })
                        .eq('slug', slug);
                }
                
                document.getElementById('story-container').classList.remove('hidden');

            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerText = 'Gagal memuat cerita.';
            }
        }

        loadStory();
    </script>
</body>
</html>
