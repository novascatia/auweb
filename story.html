<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading - Seyraphine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] }, colors: { paper: '#faf9f6', ink: '#1c1c1c', accent: '#ea580c' } } }
        }
    </script>
    <style>
        .story-content p { margin-bottom: 1.5em; line-height: 1.8; }
        .story-content img { max-width: 100%; height: auto; border-radius: 0.5rem; margin: 2rem auto; display: block; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-paper text-ink dark:bg-gray-900 dark:text-gray-100 font-sans min-h-screen p-8 transition-colors duration-300">
    
    <button id="theme-toggle" class="fixed top-6 right-6 p-2 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors z-50">
        <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
        <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
    </button>

    <div class="max-w-2xl mx-auto">
        <a href="/library.html" class="text-sm text-gray-500 dark:text-gray-400 hover:text-ink dark:hover:text-white mb-12 inline-block">&larr; Back to Library</a>
        
        <div id="loading" class="animate-pulse text-center py-10 text-gray-500 dark:text-gray-400">Loading story...</div>
        
        <article id="story-container" class="hidden">
            <h1 id="title" class="text-4xl md:text-5xl font-serif font-bold mb-2 text-center text-ink dark:text-white"></h1>
            
            <p id="view-count" class="text-sm text-gray-500 dark:text-gray-400 mb-8 text-center font-medium tracking-wide"></p>
            
            <div id="content" class="story-content text-lg text-gray-800 dark:text-gray-200"></div>
        </article>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
    <script>
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
        const themeToggleBtn = document.getElementById('theme-toggle');

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        });

        async function loadStory() {
            try {
                const configRes = await fetch('/.netlify/functions/get-config');
                const keys = await configRes.json();
                const supabase = window.supabase.createClient(keys.supabaseUrl, keys.supabaseKey);

                const pathArray = window.location.pathname.split('/');
                const slug = pathArray[pathArray.length - 1]; 

                const { data, error } = await supabase
                    .from('stories')
                    .select('*')
                    .eq('slug', slug)
                    .single();

                document.getElementById('loading').style.display = 'none';

                if (error || !data) {
                    document.getElementById('story-container').innerHTML = '<h1 class="text-2xl font-serif text-center mt-10">Story not found.</h1>';
                } else {
                    document.getElementById('title').innerText = data.title;
                    document.getElementById('content').innerHTML = data.content; 
                    
                    const currentViews = data.views || 0;
                    const newViews = currentViews + 1;
                    
                    document.getElementById('view-count').innerText = `${newViews} views`;
                    
                    await supabase
                        .from('stories')
                        .update({ views: newViews })
                        .eq('slug', slug);
                }
                
                document.getElementById('story-container').classList.remove('hidden');

            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerText = 'Gagal memuat cerita.';
            }
        }

        loadStory();
    </script>
</body>
</html>
