<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seyraphine's AU Archive</title>
    
    <!-- Tailwind CSS (CDN untuk kemudahan tanpa install) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts untuk estetika "Novel" dan "UI Modern" -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
        // Kustomisasi warna Tailwind
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        paper: '#faf9f6',
                        ink: '#1c1c1c',
                        accent: '#ea580c' // Warna orange khas ala platform baca
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-paper text-ink font-sans antialiased min-h-screen flex flex-col selection:bg-accent selection:text-white">

    <!-- Navigasi Sederhana -->
    <header class="w-full max-w-4xl mx-auto px-6 py-8 flex justify-between items-center">
        <div class="text-xl font-serif font-bold tracking-tight">
            Seyraphine<span class="text-accent">.</span>
        </div>
        <nav>
            <a href="#" class="text-sm font-medium text-gray-500 hover:text-ink transition-colors">Library</a>
        </nav>
    </header>

    <!-- Konten Utama (Hero Section) -->
    <main class="flex-grow flex flex-col items-center justify-center px-6 py-12">
        <div class="max-w-2xl text-center space-y-8 animate-fade-in-up">
            
            <!-- Elemen Dekoratif -->
            <div class="text-accent mb-4">
                <svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                </svg>
            </div>

            <h1 class="text-4xl md:text-6xl font-serif font-bold leading-tight text-ink">
                Read story on <br>
                <span class="italic font-normal text-gray-700">seyraphineyap.my.id</span>
            </h1>
            
            <p class="text-lg md:text-xl text-gray-500 font-light max-w-lg mx-auto">
                A curated collection of my Alternate Universe stories. Find your favorite characters in entirely new worlds.
            </p>

            <div class="pt-4">
                <a href="#library" class="inline-flex items-center justify-center px-8 py-3 text-base font-medium text-white bg-ink rounded-full hover:bg-gray-800 transition-all duration-200 shadow-sm hover:shadow-md">
                    Start Reading
                </a>
            </div>
        </div>
    </main>

    <!-- Footer / Credit Section -->
    <footer class="w-full max-w-4xl mx-auto px-6 py-8 border-t border-gray-200 mt-auto text-center">
        <p class="text-sm text-gray-500">
            Created by 
            <a href="https://x.com/seyraphineyap" target="_blank" rel="noopener noreferrer" class="font-medium text-ink hover:text-accent transition-colors border-b border-transparent hover:border-accent pb-0.5">
                Seyraphine on X
            </a>
        </p>
    </footer>

</body>
</html>
